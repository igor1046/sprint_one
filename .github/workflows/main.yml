name: API Tests + Allure Report

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

          curl -L -o allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Run API tests
        run: |
          poetry run pytest tests/api --junitxml=reports/junit.xml

      - name: Generate Allure report
        if: always()
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload artifacts (Allure + JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            reports/junit.xml
            reports/allure-results
            reports/allure-report
