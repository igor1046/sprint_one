name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
      
          curl -L -o allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz
      
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Create reports dirs
        run: mkdir -p reports/allure-results

      - name: Run tests
        run: |
          poetry run pytest tests/playwright tests/api \
            --junitxml=reports/junit.xml

      - name: Generate Allure report (HTML)
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: publish Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: reports/allure-report

      - name: Upload Allure raw results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml
